name: Build and Push latest Images

on:
  push:
    branches:
      - linter
    workflow_run: [Scan python code syntax]
      - types: [completed]

jobs:
  checkout-code:
    runs-on: self-hosted  
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
    
  build-images:
    needs: checkout-code
    runs-on: self-hosted
    steps:
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKER_USER }}/sample-python-app:latest